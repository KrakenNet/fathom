repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        # thirdParty is a required dcoapp config key (.github/dco.yml), not a typo.
        args: [--skip, "docs/reference/*,docs/llms*.txt,docs/changelog.json,docs/superpowers/*,uv.lock", -L, thirdparty]

  - repo: local
    hooks:
      # Auto-append a DCO Signed-off-by trailer so commits never trip the DCO
      # check. Installed by `make init` (needs the prepare-commit-msg stage).
      - id: dco-signoff
        name: DCO Signed-off-by
        entry: scripts/dco_signoff.sh
        language: script
        stages: [prepare-commit-msg]
        always_run: true
