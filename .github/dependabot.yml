version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      python-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    cooldown:
      default-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "gomod"
    directory: "/packages/fathom-go"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    cooldown:
      default-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      go-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directories:
      - "/packages/fathom-ts"
      - "/packages/fathom-editor"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    cooldown:
      default-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    cooldown:
      default-days: 3
      semver-minor-days: 5
      semver-major-days: 7
