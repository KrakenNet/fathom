name: Bug Report
description: Report a bug in fathom-rules
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include tracebacks if applicable.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Fathom Version
      description: "Output of: python -c 'import fathom; print(fathom.__version__)'"
      placeholder: "0.3.1"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of: python --version"
      placeholder: "3.13.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core Engine
        - YAML Compiler
        - REST Server (FastAPI)
        - gRPC Server
        - MCP Server
        - CLI
        - Rule Pack (OWASP/NIST/HIPAA/CMMC)
        - LangChain Integration
        - CrewAI Integration
        - OpenAI Agents Integration
        - Google ADK Integration
        - Attestation
        - Fleet (Redis/Postgres)
        - Other
    validations:
      required: true
