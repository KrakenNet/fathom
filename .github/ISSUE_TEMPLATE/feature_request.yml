name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the use case.
  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this solve? What use case does it enable?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core Engine
        - YAML Compiler
        - REST Server (FastAPI)
        - gRPC Server
        - MCP Server
        - CLI
        - Rule Packs
        - SDK (Python/Go/TypeScript)
        - Documentation
        - Other
    validations:
      required: true
