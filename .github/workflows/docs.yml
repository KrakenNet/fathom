name: docs

on:
  pull_request:
    paths:
      - "src/**"
      - "docs/**"
      - "packages/**"
      - "protos/**"
      - "CHANGELOG.md"
      - "mkdocs.yml"
      - "Makefile"
      - "scripts/**"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # gomarkdoc walks git history to construct source-link anchors
      # (e.g. ``## type [AssertFactRequest](<...client.go#L83-L87>)``).
      # The default ``fetch-depth: 1`` makes every file appear
      # last-modified in the PR merge commit, so gomarkdoc can't resolve
      # a symbol's introducing commit and silently drops the link. Output
      # then differs from any developer machine with full history and
      # the drift gate fails on every PR.
      # ``scripts/check_doc_sources.py`` also walks ``git log`` to find
      # the most recent commit touching each cited source file.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: uv sync --extra docs --extra server --extra mcp

      # arduino/setup-protoc@v3 has an unfixed bug ("unable to get
      # latest version", arduino/setup-protoc#108) that intermittently
      # breaks CI even with an explicit version pin. Install protoc
      # directly from the upstream release archive instead.
      - name: Install protoc
        run: |
          set -euo pipefail
          PROTOC_VERSION=27.3
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          sudo chmod +x /usr/local/bin/protoc
          protoc --version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install protoc-gen-doc
        run: go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@v1.5.1

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Version sync
        run: uv run python scripts/check_version_sync.py

      - name: Generate docs artifacts
        run: make docs-gen

      - name: Generate foreign-toolchain docs
        run: make docs-gen-foreign

      - name: Drift gate
        run: |
          if ! git diff --exit-code docs/reference docs/llms.txt docs/llms-full.txt docs/changelog.json; then
            echo "::error::Generated docs artifacts are stale. Run 'make docs-gen && make docs-gen-foreign' and commit."
            exit 1
          fi

      - name: Build (strict)
        run: uv run mkdocs build --strict

      - name: Docstring coverage
        run: uv run python scripts/check_docstrings.py

      - name: SDK coverage
        run: uv run python scripts/check_sdk_coverage.py

      - name: Doc source drift gate
        run: uv run python scripts/check_doc_sources.py

      - name: Tutorial snippet verification
        run: uv run python scripts/verify_tutorial_snippets.py docs/tutorials
        if: hashFiles('docs/tutorials/*.md') != ''

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            docs/**/*.md
            !docs/reference/**
            !docs/llms*.txt
            !docs/superpowers/**
            !docs/_prompts/**

      - name: Spelling
        run: uv run codespell docs/ --skip "docs/reference/*,docs/llms*.txt,docs/changelog.json,docs/superpowers/*"

      - name: Link check
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress --exclude-path docs/superpowers docs/
          fail: true
