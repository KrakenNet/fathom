name: docs

# Two jobs, two severities:
#
#   docs          REQUIRED (branch protection). Deterministic and fast:
#                 version-sync + strict mkdocs build + docstring/SDK
#                 coverage + tutorial snippets. It does NOT regenerate
#                 artifacts, walk git history, or hit the network — all of
#                 which are nondeterministic across the squash-merge
#                 boundary or depend on an exact toolchain, and so must
#                 never gate a merge.
#
#   docs-quality  ADVISORY (not a required check; every step is
#                 continue-on-error). Regenerates artifacts and runs the
#                 drift / freshness / spelling / lint / link checks as
#                 warnings. These inform the maintainer without blocking an
#                 unrelated PR (e.g. a security dependency bump). Generated
#                 artifacts are auto-refreshed on release PRs by
#                 release-please-docs.yml; hand-authored generator changes
#                 surface here as a warning to run `make docs-gen`.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ---- REQUIRED: does the documentation build? -------------------------
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: uv sync --extra docs --extra server --extra mcp

      - name: Version sync
        run: uv run python scripts/check_version_sync.py

      # Builds against the committed generated artifacts. Staleness of those
      # artifacts is advisory (see docs-quality), not a build failure — a
      # strict build validates nav, internal links, and rendering, which is
      # what "the docs build" means.
      - name: Build (strict)
        run: uv run mkdocs build --strict

      - name: Docstring coverage
        run: uv run python scripts/check_docstrings.py

      - name: SDK coverage
        run: uv run python scripts/check_sdk_coverage.py

      - name: Tutorial snippet verification
        if: hashFiles('docs/tutorials/*.md') != ''
        run: uv run python scripts/verify_tutorial_snippets.py docs/tutorials

  # ---- ADVISORY: quality signals, never block a merge ------------------
  docs-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # full history: gomarkdoc + check_doc_sources walk git log
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: uv sync --extra docs --extra server --extra mcp

      # arduino/setup-protoc@v3 is unreliable (see ci.yml); install from the
      # upstream release archive. continue-on-error: a missing foreign
      # toolchain just skips its generators (the Makefile guards on presence).
      - name: Install protoc
        continue-on-error: true
        run: |
          set -euo pipefail
          PROTOC_VERSION=27.3
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          sudo chmod +x /usr/local/bin/protoc
          protoc --version

      - name: Set up Go
        continue-on-error: true
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/fathom-go/go.mod

      - name: Install protoc-gen-doc
        continue-on-error: true
        run: go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@v1.5.1

      - name: Install Node
        continue-on-error: true
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        continue-on-error: true
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Regenerate artifacts
        continue-on-error: true
        run: |
          make docs-gen
          make docs-gen-foreign

      - name: Generated-artifact drift (advisory)
        continue-on-error: true
        run: |
          if ! git diff --exit-code docs/reference docs/llms.txt docs/llms-full.txt docs/changelog.json; then
            echo "::warning::Generated docs artifacts are stale. Run 'make docs-gen && make docs-gen-foreign' and commit."
          fi

      - name: Source drift (advisory)
        continue-on-error: true
        run: uv run python scripts/check_doc_sources.py

      - name: Markdown lint (advisory)
        continue-on-error: true
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            docs/**/*.md
            !docs/reference/**
            !docs/llms*.txt
            !docs/superpowers/**
            !docs/_prompts/**

      - name: Spelling (advisory)
        continue-on-error: true
        run: uv run codespell docs/ --skip "docs/reference/*,docs/llms*.txt,docs/changelog.json,docs/superpowers/*"

      - name: Link check (advisory)
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-path docs/superpowers --exclude-path docs/llms.txt --exclude-path docs/llms-full.txt docs/
          fail: false
