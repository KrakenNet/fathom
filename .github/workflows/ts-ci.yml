name: ts-ci

# No path filter on pull_request: ts-test is a required status check for
# branch protection (dependabot auto-merge waits on it). A path-filtered
# required check never reports on non-matching PRs, which would block
# merging forever.
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "packages/fathom-ts/**"
      - ".github/workflows/ts-ci.yml"
  workflow_dispatch: {}

concurrency:
  group: ts-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4.0.2
        id: filter
        with:
          filters: |
            # True when the PR changes anything that isn't pure documentation.
            # Negation-only failure mode is safe: if dorny ignored the ``!`` patterns,
            # ``**`` matches everything → ``code`` stays true → jobs run anyway. They
            # only skip when every changed file is docs/markdown. ``docs`` (docs.yml)
            # is intentionally NOT gated — it must run on docs-only PRs.
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!mkdocs.yml'
              - '!LICENSE'

  test:
    name: ts-test
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/fathom-ts
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      # The pnpm lockfile lives in the package, not a workspace root, so
      # install from packages/fathom-ts (the working-directory default).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test
