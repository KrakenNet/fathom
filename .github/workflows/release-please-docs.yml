name: release-please-docs

# release-please bumps the version in pyproject.toml + __init__.py, which
# stales the generated docs artifacts that embed it (openapi.json,
# llms-full.txt, ...). The docs drift gate would then fail on every
# release PR. This workflow regenerates the artifacts and pushes them to
# the release branch. The push uses RELEASE_PLEASE_TOKEN so CI re-runs on
# the new commit (GITHUB_TOKEN pushes would not trigger workflows).
#
# No infinite loop: the run triggered by our own push finds no diff and
# exits without committing. release-please force-pushes over this commit
# on every main push; the synchronize event re-runs this workflow.

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Same-repo release-please branches only; fork PRs never get the PAT.
    if: >
      startsWith(github.head_ref, 'release-please--') &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # full history: gomarkdoc + check_doc_sources walk git log
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: uv sync --extra docs --extra server --extra mcp

      # Same protoc install pattern as docs.yml (arduino/setup-protoc@v3
      # is unreliable, see comment there).
      - name: Install protoc
        run: |
          set -euo pipefail
          PROTOC_VERSION=27.3
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          sudo chmod +x /usr/local/bin/protoc
          protoc --version

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: packages/fathom-go/go.mod

      - name: Install protoc-gen-doc
        run: go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@v1.5.1

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Regenerate docs artifacts
        run: |
          make docs-gen
          make docs-gen-foreign

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No drift; nothing to commit."
            exit 0
          fi
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): regenerate docs artifacts for version bump"
          git push
