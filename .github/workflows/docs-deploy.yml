name: docs-deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "mike version alias (e.g. 0.3 or latest)"
        required: true
        default: "latest"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install protoc-gen-doc
        run: go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@v1.5.1

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Set up Python
        uses: actions/setup-python@v6                                                                                                                                                
        with:
          python-version: "3.13"  
      
      - name: Install Python deps
        run: uv sync --extra docs --extra server --extra mcp

      - name: Generate everything
        run: |
          make docs-gen
          make docs-gen-foreign

      - name: Configure git for mike
        run: |
          git config user.name "docs-bot"
          git config user.email "docs-bot@users.noreply.github.com"

      - name: Resolve version label
        id: label
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "alias=" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF##refs/tags/}"
            VER="${TAG#v}"
            MM="$(echo "$VER" | awk -F. '{print $1"."$2}')"
            echo "version=${MM}" >> "$GITHUB_OUTPUT"
            echo "alias=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via mike
        run: |
          if [ -n "${{ steps.label.outputs.alias }}" ]; then
            uv run mike deploy --push --update-aliases \
              "${{ steps.label.outputs.version }}" "${{ steps.label.outputs.alias }}"
            uv run mike set-default --push "${{ steps.label.outputs.alias }}"
          else
            uv run mike deploy --push "${{ steps.label.outputs.version }}"
            uv run mike set-default --push "${{ steps.label.outputs.version }}"
          fi
