# Bot that auto-applies ruff fixes + formatting to PRs (incl. fork PRs) via the
# autofix.ci GitHub App, instead of failing the build on style. Install the
# autofix.ci app on the KrakenNet org once for this to push commits back.
# ruff is scoped to src/ tests/ to match the lint job in ci.yml.
name: autofix.ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: ruff fix + format
        run: |
          uvx ruff@0.11.9 check --fix-only src/ tests/
          uvx ruff@0.11.9 format src/ tests/
      - uses: autofix-ci/action@v1.3.4
