name: go-ci

# No path filter on pull_request: go-test/integration are required status
# checks for branch protection (dependabot auto-merge waits on them). A
# path-filtered required check never reports on non-matching PRs, which
# would block merging forever.
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "protos/**"
      - "packages/fathom-go/**"
      - ".github/workflows/go-ci.yml"
  workflow_dispatch: {}

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: go-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/fathom-go
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: packages/fathom-go/go.mod

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc Go plugins
        # Pin both plugins to the exact versions recorded in the committed
        # *.pb.go headers (protoc-gen-go v1.36.11, protoc-gen-go-grpc v1.6.1)
        # so `verify-grpc` regenerates byte-identical output. `@latest`
        # silently drifts and breaks the drift gate on unrelated PRs.
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: verify-grpc (drift check)
        run: make verify-grpc

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: packages/fathom-go/go.mod

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install fathom (Python) for live gRPC server
        run: |
          uv sync --all-extras
          uv pip install -e .

      - name: go test (integration)
        working-directory: packages/fathom-go
        run: go test -tags integration ./...
