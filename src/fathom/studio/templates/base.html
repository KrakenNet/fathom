<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fathom Policy Studio · {% block title %}{% endblock %}</title>
    <style>
      :root {
        --bg: #0f1419;
        --panel: #1a212b;
        --border: #2b3441;
        --fg: #e6edf3;
        --muted: #8b97a7;
        --accent: #4ea1ff;
        --allow: #3fb950;
        --deny: #f85149;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.5;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      header.topbar {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border);
      }
      header.topbar h1 { font-size: 1.15rem; margin: 0; }
      header.topbar .tag { color: var(--muted); font-size: 0.85rem; }
      nav.panelnav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        border-bottom: 1px solid var(--border);
      }
      nav.panelnav a {
        padding: 0.25rem 0.7rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 0.85rem;
        color: var(--fg);
      }
      nav.panelnav a:hover { border-color: var(--accent); text-decoration: none; }
      main { padding: 1.5rem; max-width: 1000px; }
      h2 { margin-top: 0; }
      .muted { color: var(--muted); }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem 1.25rem;
        margin-bottom: 1rem;
      }
      label { display: block; font-size: 0.85rem; color: var(--muted); margin: 0.5rem 0 0.2rem; }
      input[type="text"], textarea {
        width: 100%;
        background: #0c1117;
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.5rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85rem;
      }
      button {
        margin-top: 0.75rem;
        background: var(--accent);
        color: #06243f;
        border: none;
        border-radius: 6px;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      pre {
        background: #0c1117;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.75rem;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85rem;
      }
      table { border-collapse: collapse; width: 100%; }
      th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
      .decision { font-weight: 700; }
      .decision--allow { color: var(--allow); }
      .decision--deny { color: var(--deny); }
      .notice { border-left: 3px solid var(--accent); }
      .error { border-left: 3px solid var(--deny); }
      ul.packs, ul.scenarios { list-style: none; padding: 0; }
      ul.packs li, ul.scenarios li {
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 0.4rem;
        font-family: ui-monospace, monospace;
      }
      code { font-family: ui-monospace, monospace; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <h1><a href="/">Fathom Policy Studio</a></h1>
      <span class="tag">deterministic policy reasoning</span>
    </header>
    <nav class="panelnav">
      {% for route, name, _ in panels %}
        <a href="{{ route }}">{{ name }}</a>
      {% endfor %}
    </nav>
    <main>
      {% block body %}{% endblock %}
    </main>
  </body>
</html>
