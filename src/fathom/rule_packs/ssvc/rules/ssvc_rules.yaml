# CISA SSVC v2.0.3 Deployer Tree — one rule per published branch.
#
# Generated from references/branches.yaml (17 branches spanning
# Track / Track* / Attend / Act decisions). Each rule matches the
# 4 input templates (exploitation, exposure, automatable, mission_impact)
# on exact slot values, then asserts __fathom_decision with
# action=route and metadata.decision=<CISA label>.
#
# Track* is carried as a JSON string value inside the metadata slot
# (which is typed STRING in __fathom_decision); the '*' never reaches
# the CLIPS symbol table.
#
# See design.md C4 / FR-12 / AC-4.4.

module: ssvc
ruleset: ssvc-deployer-tree
version: 2.0.3
rules:
- name: ssvc_branch_01
  salience: 10
  when:
  - template: exploitation
    conditions:
    - slot: value
      expression: equals(none)
  - template: exposure
    conditions:
    - slot: value
      expression: equals(small)
  - template: automatable
    conditions:
    - slot: value
      expression: equals(no)
  - template: mission_impact
    conditions:
    - slot: value
      expression: equals(minimal)
  then:
    action: route
    reason: 'SSVC decision: Track'
    metadata:
      decision: Track
